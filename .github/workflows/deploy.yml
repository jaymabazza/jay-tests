name: Build and Deploy
on: [push]
env: 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Authenticate with Google
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. Setup Terraform
      # 'terraform_wrapper: false' is the magic fix for hanging logs
      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 3. Infrastructure First (Registry & Service)
      - name: 'Terraform Apply'
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      # 4. Build and Push the real Docker image
      - name: 'Build & Push'
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev
          docker build --platform linux/amd64 -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/hello-app:latest .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/hello-app:latest

      # 5. Final Refresh of Cloud Run
      - name: 'Update Cloud Run'
        run: |
          gcloud run deploy hello-world-service \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/hello-app:latest \
            --region us-central1